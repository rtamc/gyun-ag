<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D-Day 카운트다운</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 10px; }
        #target-date { color: #666; font-size: 1.1rem; }
        #timer {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
        }
        .d-day { color: #e74c3c; font-size: 1.5rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎖️ 전역까지 남은 시간</h1>
    <div id="target-date">목표일: 2027년 8월 22일</div>
    <div id="timer">00일 00:00:00</div>
    <div id="d-day-display" class="d-day"></div>
</div>

<script>
    const targetDate = new Date("2027-08-22T00:00:00").getTime();

    const updateTimer = () => {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            document.getElementById("timer").innerHTML = "전역을 축하합니다!";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = 
            `${days}일 ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        
        document.getElementById("d-day-display").innerHTML = `D-${days}`;
    };

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
